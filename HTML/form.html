<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>

    <h1>Login Form</h1>
    <form>
        <label for="Name">
            Name: 
            <input placeholder="Name" type="text" name="" id="">
        </label>
            <br><br>

        <label for="Password">
            Password:
            <input placeholder="Password" type="password" name="Password" id="">
        </label>
            <br><br>

            <label for="E-mail">
                E-mail:
                <input placeholder="E-mail" type="email" name="E-mail" id="">
            </label>

            <label for="URL">
                Link:
                <input placeholder="https://www.demo.com" type="url" name="URL" id="">
            </label>
                <br><br>

            <label for="Comments">
                Comments:
                <textarea name="Comments" rows="5" columns="5" id=""></textarea>
            </label>
                <br><br>

        <h1>GAMES</h1>    
            <label for="Games">
                Football
                <input type="checkbox" name="Football" id="">
            </label>
                    <br><br>

            <label for="Games">
                Basketball
                <input type="checkbox" name="Basketball" id="">
            </label>
                <br><br>

            <label for="Games">
                Volleyball
                <input type="checkbox" name="Volleyball" id="">
            </label>
                <br><br>

             <label for="Games">
                Cricket
                <input type="checkbox" name="Cricket" id="">
            </label>
                <br><br>

        <h1>Subjects</h1>        
            <label for="Subjects">
                Mathematics
                <input type="radio" name="Mathematics" id="">
            </label>
            <br><br>

            <label for="Subjects">
                Physics
                <input type="radio" name="Physics" id="">
            </label>
                <br><br>

            <label for="Country">Country
                <select name="" id="">
                    <option value="India">India</option>
                    <option value="Japan">Japan</option>
                    <option value="Sweden">Sweden</option>
                    <option value="Russia">Russia</option>
                    <option value="USA">USA</option>

                </select>
            </label>

            <label for="Months">Month
                <input type="month" name="Months" id="">
            </label>

        <button type="submit">
            Submit
        </button>
           

        <button type="reset">
            Reset
        </button>
            

    </form>
    
</body>
</html>
