<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #000000;
            margin :0;
            padding : 0;
            height:100vh;
            display:flex;
            justify-content: center;
            align-items: center;
        }

        .card{
            background-color: #e2dfe633;
            border-radius:10px;
            padding: 30px;
            width : 300px;
        }

        h1{
            color: #2cf2dbd8;
            text-align: center;
            margin-bottom: 20px;
        }

        input{
            margin-bottom: 15px;
            background-color: #fff;
            padding: 7px;
            border-radius: 7px;
            border:1px solid rgb(33, 240, 243);  /* for outline of border */
        }

        input:focus{
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(33, 240, 243, 0.7);
            outline: none;
        }

        form{
            display: flex;
            flex-direction: column;
        }

        button{
            background-color: #11e984;
            border-radius: 7px;
            padding: 7px;
        }

        button:hover{
            background-color: #047d22;
        }


    </style>

</head>
<body>
    <div class="card">
        <h1>LOGIN</h1>
       <form action="">

           <input type="email" name="email" id="" placeholder="E-mail">
           <input type="password" name="Password" id="" placeholder="Password">
           
           <button type="submit">Log in</button>
          
       </form> 
    </div>
    
</body>
</html>
