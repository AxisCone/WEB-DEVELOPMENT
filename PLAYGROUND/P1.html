<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAY1</title>
</head>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    margin: 0px;
    padding: 20px;
    background-color: #f5f7fa;
}
.nav-container{
    margin-bottom: 40px;
}
.menu{
    background-color: #2c3e50;
    padding: 10px;
    border-radius: 8px;
}
.menu ul{
    list-style-type:none;
    margin:0;
    padding: 0;
    display:flex;
    justify-content:space-around;
    align-items: center;
}
.menu li{
    display: inline;
}

.menu a{
    text-decoration: none;
    color: #ffffff;
    background-color: #34495e;
    padding: 5px 15px;
    border-radius: 8px;
    position: relative;
}
.menu .login-btn{
    color: #ffffff;
    background-color: #e74c3c;
    padding: 5px 10px;
    border-radius: 8px;
    text-decoration: none;
    cursor: pointer;
    display: inline-block;
}
.menu a::after{
    content:"";
     position:absolute;
            background-color: #3498db;
            height: 2px;
            width: 100px;
            bottom:0;
            left:0;
            transform: scaleX(0);
            transition: transform 0.3s ease-in-out;

}
.menu a:hover::after{
            transform: scaleX(2);
         }
</style>

<body>
    <div class="nav-container">
        <nav class="menu">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="">Contact</a></li>
                <li><a href="Login.html" class="login-btn">Login</a></li>
            </ul>
        </nav>
    </div>
</body>
</html>
