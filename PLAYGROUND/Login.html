<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
</head>

<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        margin: 0px;
        padding: 0px;
        background-color: #0d0d0d;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .card{
        background-color: #1a1a1a;
        border-radius: 8px;
        padding: 20px;
        width: 400px;
        /* box-shadow: 0px 0px 20px rgba(255, 0, 0, 0.3); */
    }

    h1{
        color: #ff3333;
        text-align: center;
        margin-bottom: 20px;
    }

    form{
        display: flex;
        flex-direction: column;
    }

    label{
        display: flex;
        flex-direction: column;
        margin-bottom: 15px;
        color: white;
        font-weight: bold;
    }

    input{
        margin-top: 5px;
        margin-bottom: 20px;
        background-color: #2b2b2b;
        color: white;
        padding: 7px;
        border-radius: 8px;
        border: 1px solid #ff3333;
        width: 100%;
        box-sizing: border-box;
    }

    input::placeholder{
        color: #b3b3b3;
    }

    input:focus{
        transform: scale(1.05);
        box-shadow: 0px 0px 15px rgba(255, 51, 51, 0.8);
        outline: none;
    }

    button{
        background-color: #cc0000;
        color: white;
        padding: 10px;
        /* width: 100px; */
        border-radius: 8px;
        font-size: larger;
        font-weight: bolder;
        border: none;
        cursor: pointer;
    }

    button:hover{
        background-color: #ff1a1a;
    }

</style>

<body>
    <div class="card">
        <h1>LOGIN</h1>

        <form action="">

            <label for="email">
                E-mail:
                <input type="email" id="email" placeholder="E-mail">
            </label>

            <label for="password">
                Password:
                <input type="password" id="password" placeholder="Password">
            </label>

            <button type="submit">Login</button>

        </form>
    </div>
</body>
</html>
