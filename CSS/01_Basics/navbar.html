<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #0c0b0b;
        }

        .nav-container {
            margin-bottom: 40px;
         }
         h2 {
            margin-bottom: 20px;
            color: antiquewhite;
         }
         .nav1{
            background-color: #eb1e0b;
            padding: 10px;
         }
         .nav1 ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: space-around;
         }
         .nav1 li{
            display: inline;
         }
         .nav1 a{
            text-decoration: none;
            color: rgb(255, 255, 255);
            background-color: #000000;
            padding: 5px 15px;
            border-radius: 8px;
            position: relative;
         }
         .nav1 .login-btn{
            color: rgb(0, 0, 0);
            border: none;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 5px 15px;
            cursor:pointer;
         }

         .nav1 a::after{
            content:"";
            position:absolute;
            background-color: #fff;
            height: 2px;
            width: 100px;
            bottom:0;
            left:0;
            transform: scaleX(0);
            transition: transform 0.3s ease-in-out;

         }

         .nav1 a:hover::after{
            transform: scaleX(2);
         }

         .nav2{
            background-color: #043157;
            width:180px;
            padding: 20px;
         }

         .nav2 ul{
            list-style-type: none;
            margin:0;
            padding: 0;

         }

         .nav2 li{
           margin-bottom: 12px;
         }

         .nav2 a{
            text-decoration: none;
            color: #ffffff;
            display: block;
            padding: 10px;
            width:100%;
         }

         .nav2 a:hover{
            background-color: #0a21bc;
         }

         .nav2 .login-btn{
            background-color: #0989f3;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            width:100%;
            padding:10px;
            cursor: pointer;
         }

         .nav2 .login-btn:hover{
            background-color: #0a3bff;
            border:1px solid white
         }

         .nav3{
            background-color: #070bea;
            padding: 10px;
         }
         .nav3 ul{
            list-style-type:none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content:space-around;
            align-items: center;
         }
         .nav3 a{
            text-decoration: none;
            color: #10eaf1fa;
            padding: 10px;
            display: block;
         }
         .nav3 a:hover{
            background-color: #6b6dea;
            border-radius: 8px;
         }
         .nav3 .dropdown-content{
            display: none;   
         }
         .nav3 .dropdown:hover .dropdown-content{
            display: block;
            position:absolute;
            background-color: #4577f4;
            min-width: 150px;
            border-radius: 8px;
         }
         .nav3 button{
            border-radius: 8px;
            padding: 5px 15px;
            background-color: #04cffc;
            font-weight: bolder;
         }

          
    </style>


</head>
<body>
    <div class="nav-container"> 
        <h2>Variation 1:Horizontal with underline effects</h2>
        <nav class="nav1">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Products</a></li>
                <li><button class="login-btn">Login</button></li>
                
            </ul>
        </nav>

    </div>

    <div class="nav-container">
      <h2>Variation 2:Vertical with hover effects</h2>
      <nav class="nav2">
         <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Product</a></li>
            <li><button class="login-btn">Login</button></li>
         </ul>
      </nav>
    </div>

    <div class = "nav-container">
      <h2>Variation 3:Horizontal with dropdown</h2>
      <nav class="nav3">
         <ul>
            <li><a href="#">Home</a></li>
            <li class="dropdown">
               <a href="#">About</a>
               <div class="dropdown-content">
                  <a href="#">Our Story</a>
                  <a href="#">Team</a>
                  <a href="#">Contact</a>
               </div>
            </li>
            <li><a href="#">Products</a></li>
            <li><button type="submit">Login</button></li>
         </ul>
      </nav>
    </div>
    
</body>
</html>
